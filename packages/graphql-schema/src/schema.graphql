# ── Queries ───────────────────────────────────────────────────────

type Query {
  # Auth
  me: User

  # Users
  user(id: ID, username: String): User
  searchUsers(query: String!, role: Role, page: Int, limit: Int): UserConnection!
  teachers(filter: TeacherFilterInput, page: Int, limit: Int): TeacherConnection!
  teacher(id: ID!): TeacherProfile

  # Courses
  courses(filter: CourseFilterInput, page: Int, limit: Int): CourseConnection!
  course(id: ID, slug: String): Course
  myCourses(page: Int, limit: Int): CourseConnection!
  myEnrollments(page: Int, limit: Int): EnrollmentConnection!
  categories: [Category!]!

  # Bookings
  myBookings(status: BookingStatus, page: Int, limit: Int): [Booking!]!
  booking(id: ID!): Booking
  teacherAvailability(teacherProfileId: ID!, date: DateTime): [TeacherAvailability!]!

  # Events
  events(filter: EventFilterInput, page: Int, limit: Int): EventConnection!
  event(id: ID, slug: String): Event
  nearbyEvents(latitude: Float!, longitude: Float!, radiusKm: Float!, page: Int, limit: Int): EventConnection!
  myEventBookings(page: Int, limit: Int): [EventBooking!]!

  # Assessments
  assessmentQuestions(category: String, difficulty: String, instrument: String, limit: Int): [AssessmentQuestion!]!
  myAssessments: [Assessment!]!

  # Feed
  feed(page: Int, limit: Int): FeedPostConnection!
  feedPost(id: ID!): FeedPost

  # Reviews
  reviews(courseId: ID, eventId: ID, bookingId: ID, page: Int, limit: Int): ReviewConnection!

  # Student availability (self-declaration)
  myAvailability: [StudentAvailability!]!

  # Admin
  adminStats: AdminStats!
  adminSettings: [AdminSetting!]!
  adminUsers(role: Role, search: String, page: Int, limit: Int): [User!]!
}

# ── Mutations ─────────────────────────────────────────────────────

type Mutation {
  # Auth
  register(input: RegisterInput!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  logout: Boolean!
  refreshToken(token: String!): AuthPayload!
  requestPasswordReset(email: String!): Boolean!
  resetPassword(token: String!, newPassword: String!): Boolean!
  verifyEmail(token: String!): Boolean!

  # Users
  updateProfile(input: UpdateProfileInput!): User!
  applyAsTeacher(input: ApplyAsTeacherInput): TeacherProfile!
  updateTeacherProfile(
    headline: String
    teachingBio: String
    hourlyRate: Float
    instruments: [String!]
    specializations: [String!]
    teachingFormats: [String!]
    isAvailable: Boolean
    calendlyUsername: String
  ): TeacherProfile!
  addCertification(title: String!, issuingBody: String, issuedYear: Int, documentUrl: String): TeacherCertification!
  setAvailability(slots: [AvailabilitySlotInput!]!): [TeacherAvailability!]!

  # Student availability self-declaration
  setStudentAvailability(slots: [AvailabilitySlotInput!]!): [StudentAvailability!]!

  completeOnboarding: User!
  followUser(userId: ID!): User!
  unfollowUser(userId: ID!): User!

  # Courses
  createCourse(input: CreateCourseInput!): Course!
  updateCourse(id: ID!, input: UpdateCourseInput!): Course!
  publishCourse(id: ID!): Course!
  archiveCourse(id: ID!): Course!
  createSection(input: CreateSectionInput!): CourseSection!
  createLesson(input: CreateLessonInput!): Lesson!
  enrollInCourse(courseId: ID!): Enrollment!
  markLessonComplete(lessonId: ID!): LessonProgress!
  syncCoursesFromMoodle: MoodleSyncResult!

  # Bookings
  bookSession(input: BookSessionInput!): Booking!
  confirmBooking(bookingId: ID!): Booking!
  cancelBooking(bookingId: ID!): Booking!
  createZoomMeeting(bookingId: ID!): ZoomMeetingInfo!

  # Events
  createEvent(input: CreateEventInput!): Event!
  updateEvent(id: ID!, input: UpdateEventInput!): Event!
  publishEvent(id: ID!): Event!
  bookEvent(eventId: ID!): EventBooking!
  cancelEventBooking(bookingId: ID!): EventBooking!

  # Assessments
  startAssessment: Assessment!
  submitAssessmentAnswer(input: SubmitAssessmentAnswerInput!): AssessmentAnswer!
  completeAssessment(assessmentId: ID!): Assessment!

  # Feed
  createFeedPost(input: CreateFeedPostInput!): FeedPost!
  likeFeedPost(postId: ID!): FeedPost!
  unlikeFeedPost(postId: ID!): FeedPost!
  commentOnPost(postId: ID!, body: String!): FeedComment!

  # Reviews
  createReview(input: CreateReviewInput!): Review!

  # Payments
  createCheckoutSession(type: String!, refId: ID!, provider: PaymentProvider): CheckoutSession!

  # Admin
  updateAdminSetting(key: String!, value: String!): AdminSetting!
  adminBanUser(userId: ID!): User!
  adminSetRole(userId: ID!, role: Role!): User!
  syncKeycloakRoles: MoodleSyncResult!
}
