scalar DateTime
scalar JSON

# ── Enums ───────────────────────────────────────────────────────

enum Role {
  GUEST
  STUDENT
  TEACHER
  ADMIN
}

enum SkillLevel {
  BEGINNER
  ELEMENTARY
  INTERMEDIATE
  ADVANCED
  PROFESSIONAL
}

enum CourseStatus {
  DRAFT
  PUBLISHED
  ARCHIVED
}

enum BookingStatus {
  PENDING
  CONFIRMED
  COMPLETED
  CANCELLED
}

enum BookingFormat {
  ZOOM
  IN_PERSON
}

enum EventType {
  CONCERT
  MASTERCLASS
  WORKSHOP
  COMPETITION
  RECITAL
  OTHER
}

enum EventFormat {
  IN_PERSON
  ONLINE
  HYBRID
}

enum PaymentStatus {
  PENDING
  SUCCEEDED
  FAILED
  REFUNDED
}

enum PaymentProvider {
  STRIPE
  YAPEAL
}

enum EventBookingStatus {
  CONFIRMED
  CANCELLED
}

# ── Pagination ───────────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
