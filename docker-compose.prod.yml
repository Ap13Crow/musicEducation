# ── Production overrides ─────────────────────────────────────
# Layered on top of docker-compose.yml. The base file stays the
# dev source of truth (*.mymusic-coach.test); this file flips the few
# services that bake a hostname/scheme into their own config, and
# adds the Cloudflare tunnel. Bring up with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (or: export COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml)

services:

  gateway:
    volumes:
      - ./docker/gateway/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME: auth.mymusic.coach
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      # Same container target as the base mount, so this shadows the dev realm.
      - ./docker/keycloak/realm-export.prod.json:/opt/keycloak/data/import/realm-export.json

  api:
    environment:
      MOODLE_PUBLIC_HOST: learn.mymusic.coach
      KEYCLOAK_ISSUER: https://auth.mymusic.coach/realms/mymusic-coach
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: mymusic-coach
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

  # ── Next.js Web App ────────────────────────────────────────
  # SSO: KEYCLOAK_ISSUER must be the public URL (auth.mymusic.coach) because
  # the browser follows the OIDC redirect — the internal keycloak:8080 address
  # is unreachable from outside the Docker network.
  #
  # Build args: NEXT_PUBLIC_* are inlined into the bundle at build time.
  # Explicitly set here so the image is correct regardless of .env state at
  # build time. All three pillar URLs are public so the dashboard can link to them.
  web:
    build:
      args:
        NEXT_PUBLIC_GRAPHQL_URL: https://api.mymusic.coach/graphql
        NEXT_PUBLIC_GRAPHQL_WS_URL: wss://api.mymusic.coach/graphql
        NEXT_PUBLIC_PRETIX_WIDGET_URL: https://tickets.mymusic.coach
        NEXT_PUBLIC_TICKETS_URL: https://tickets.mymusic.coach
        NEXT_PUBLIC_ENABLE_LIVE_API: "true"
        NEXT_PUBLIC_LEARN_URL: "https://learn.mymusic.coach"
        NEXT_PUBLIC_BOOKING_URL: "https://booking.mymusic.coach"
        NEXT_PUBLIC_KEYCLOAK_ISSUER: "https://auth.mymusic.coach/realms/mymusic-coach"
        NEXT_PUBLIC_APP_URL: "https://app.mymusic.coach"
    environment:
      NEXTAUTH_URL: https://app.mymusic.coach
      KEYCLOAK_ISSUER: https://auth.mymusic.coach/realms/mymusic-coach

  # ── Moodle — public for admin/teacher course management ──────
  # Admins and teachers log in via Keycloak SSO at learn.mymusic.coach.
  # Students access course content through the Next.js app (Moodle WS API)
  # so they are never sent here directly.
  moodle:
    environment:
      MOODLE_HOST: learn.mymusic.coach
      MOODLE_WWWROOT: https://learn.mymusic.coach
      MOODLE_SSLPROXY: "true"
      MOODLE_OIDC_CLIENT_ID: ${MOODLE_OIDC_CLIENT_ID:-moodle-oidc}
      MOODLE_OIDC_CLIENT_SECRET: ${MOODLE_OIDC_CLIENT_SECRET}
      KEYCLOAK_ISSUER: https://auth.mymusic.coach/realms/mymusic-coach

  librebooking:
    environment:
      LIBREBOOKING_SCRIPT_URL: https://booking.mymusic.coach/Web
      LIBREBOOKING_OIDC_CLIENT_ID: ${LIBREBOOKING_OIDC_CLIENT_ID:-librebooking-saml}
      LIBREBOOKING_OIDC_CLIENT_SECRET: ${LIBREBOOKING_OIDC_CLIENT_SECRET}
      LIBREBOOKING_KEYCLOAK_URL: https://auth.mymusic.coach
      LIBREBOOKING_KEYCLOAK_REALM: mymusic-coach

  # Pretix keeps a public route (tickets.mymusic.coach) because the JS widget
  # must be loaded by the browser.  PRETIX_URL is used by Pretix itself for
  # self-referencing links (e.g. order confirmation e-mails).
  pretix:
    environment:
      PRETIX_URL: https://tickets.mymusic.coach
      PRETIX_ADMIN_EMAIL: ${PRETIX_ADMIN_EMAIL:-admin@mymusic.coach}
      PRETIX_ADMIN_PASSWORD: ${PRETIX_ADMIN_PASSWORD}
      PRETIX_EXTRA_ADMIN_EMAIL: ${PRETIX_EXTRA_ADMIN_EMAIL:-}
      PRETIX_EXTRA_ADMIN_PASSWORD: ${PRETIX_EXTRA_ADMIN_PASSWORD:-}
      PRETIX_OIDC_ISSUER: https://auth.mymusic.coach/realms/mymusic-coach
      PRETIX_OIDC_CLIENT_ID: ${PRETIX_OIDC_CLIENT_ID:-pretix-oidc}
      PRETIX_OIDC_CLIENT_SECRET: ${PRETIX_OIDC_CLIENT_SECRET}

  # ── Cloudflare Tunnel ──────────────────────────────────────
  # Outbound-only: nothing is exposed on the public IP. Joins the
  # default network so it can reach the gateway by service name.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mymusic_coach_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      gateway:
        condition: service_started
      web:
        condition: service_started
