services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: music_edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-musicedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musicedu_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-musicedu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-musicedu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: music_edu_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pw}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak (OpenID Connect / SAML provider) ────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: music_edu_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_pw}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-musicedu}
      KC_DB_USERNAME: ${POSTGRES_USER:-musicedu}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-musicedu_dev_pw}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── GraphQL API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: music_edu_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-musicedu}:${POSTGRES_PASSWORD:-musicedu_dev_pw}@postgres:5432/${POSTGRES_DB:-musicedu}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pw}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION_PLEASE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js Web App ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: music_edu_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://api:4000/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://api:4000/graphql
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-CHANGE_THIS_IN_PRODUCTION}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-musicedu-web}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/musicedu}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── MCP Server (AI) ───────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    container_name: music_edu_mcp
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-musicedu}:${POSTGRES_PASSWORD:-musicedu_dev_pw}@postgres:5432/${POSTGRES_DB:-musicedu}
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy

  # ── MinIO (object storage for media uploads) ──────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: music_edu_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_pw}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: music_edu_network
